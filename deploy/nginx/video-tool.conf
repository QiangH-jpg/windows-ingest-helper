# 视频工具 Nginx 配置示例
# 复制到 /etc/nginx/sites-available/video-tool 并启用

upstream video_tool {
    server 127.0.0.1:8088;
    keepalive 32;
}

server {
    listen 80;
    server_name video.example.com;  # 修改为实际域名
    
    # 日志
    access_log /var/log/nginx/video-tool.access.log;
    error_log /var/log/nginx/video-tool.error.log;
    
    # 客户端请求大小限制
    client_max_body_size 500M;
    
    # 静态文件（上传的素材）
    location /uploads/ {
        alias /opt/video-tool/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # 输出视频
    location /outputs/ {
        alias /opt/video-tool/outputs/;
        expires 1d;
        add_header Cache-Control "public";
    }
    
    # API 代理
    location /api/ {
        proxy_pass http://video_tool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置（视频上传需要更长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # Results 页面
    location /results {
        proxy_pass http://video_tool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 根路径
    location / {
        proxy_pass http://video_tool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
