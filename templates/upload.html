<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量新闻短视频工具 - 上传</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #1890ff; background: #f0f7ff; }
        .upload-area.dragover { border-color: #1890ff; background: #e6f7ff; }
        input[type="file"] { display: none; }
        .file-list { margin-top: 15px; }
        .file-item { background: #f9f9f9; padding: 10px 15px; border-radius: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; resize: vertical; min-height: 150px; }
        textarea:focus { outline: none; border-color: #1890ff; }
        .btn { background: #1890ff; color: white; border: none; padding: 12px 30px; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; }
        .btn:hover { background: #40a9ff; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .status.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; display: block; }
        .status.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; display: block; }
        .progress { margin-top: 15px; }
        .progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #1890ff; width: 0%; transition: width 0.3s; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: #1890ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 轻量新闻短视频工具</h1>
        <p style="color: #666; margin-bottom: 20px;">上传视频素材和新闻稿，自动生成 30-40 秒短视频</p>
        
        <div class="section">
            <label>1. 上传视频素材（支持多选）</label>
            <div class="upload-area" id="uploadArea">
                <p>📁 点击选择或拖拽文件到此处</p>
                <p style="color: #999; font-size: 12px; margin-top: 8px;">支持 MP4、MOV 等格式</p>
                <input type="file" id="fileInput" accept="video/*" multiple>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>
        
        <div class="section">
            <label for="script">2. 输入新闻稿/口播稿</label>
            <textarea id="script" placeholder="在此输入新闻稿内容，系统将自动转换为旁白和字幕..."></textarea>
        </div>
        
        <button class="btn" id="submitBtn" onclick="submitTask()">生成视频</button>
        
        <div class="status" id="status"></div>
        
        <div class="progress" id="progress" style="display:none;">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p style="text-align: center; margin-top: 8px; color: #666;" id="progressText">处理中...</p>
        </div>
        
        <div class="links">
            <a href="/results">查看任务列表与下载 →</a>
        </div>
    </div>

    <script>
        let uploadedFileIds = [];
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        
        uploadArea.onclick = () => fileInput.click();
        
        uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); };
        uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        };
        
        fileInput.onchange = (e) => handleFiles(e.target.files);
        
        async function handleFiles(files) {
            if (!files.length) return;
            
            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }
            
            uploadArea.innerHTML = '<p>⏳ 上传中...</p>';
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.file_ids) {
                    uploadedFileIds = uploadedFileIds.concat(data.file_ids);
                    renderFileList();
                    uploadArea.innerHTML = '<p>📁 点击选择或拖拽更多文件</p><p style="color: #999; font-size: 12px; margin-top: 8px;">支持 MP4、MOV 等格式</p>';
                }
            } catch (err) {
                uploadArea.innerHTML = '<p>❌ 上传失败，请重试</p>';
            }
        }
        
        function renderFileList() {
            fileList.innerHTML = uploadedFileIds.map((id, i) => 
                `<div class="file-item"><span>✅ 素材 ${i + 1}</span><span style="color:#999;font-size:12px;">${id.slice(0,8)}...</span></div>`
            ).join('');
        }
        
        async function submitTask() {
            const script = document.getElementById('script').value.trim();
            
            if (!uploadedFileIds.length) {
                showStatus('请先上传视频素材', 'error');
                return;
            }
            if (!script) {
                showStatus('请输入新闻稿/口播稿', 'error');
                return;
            }
            
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';
            
            try {
                const res = await fetch('/api/task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({file_ids: uploadedFileIds, script: script})
                });
                const data = await res.json();
                
                if (data.task_id) {
                    showStatus('✅ 任务已提交！正在处理...', 'success');
                    pollTask(data.task_id);
                } else {
                    showStatus('❌ 提交失败：' + (data.error || '未知错误'), 'error');
                    document.getElementById('submitBtn').disabled = false;
                }
            } catch (err) {
                showStatus('❌ 提交失败：' + err.message, 'error');
                document.getElementById('submitBtn').disabled = false;
            }
        }
        
        async function pollTask(taskId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/task/${taskId}`);
                    const task = await res.json();
                    
                    document.getElementById('progressFill').style.width = task.progress + '%';
                    document.getElementById('progressText').textContent = `处理中... ${task.progress}%`;
                    
                    if (task.status === 'completed') {
                        clearInterval(interval);
                        document.getElementById('progressText').textContent = '✅ 完成！';
                        showStatus(`视频已生成！<a href="/results">前往下载页</a>`, 'success');
                        document.getElementById('submitBtn').disabled = false;
                    } else if (task.status === 'failed') {
                        clearInterval(interval);
                        showStatus('❌ 处理失败：' + task.error, 'error');
                        document.getElementById('submitBtn').disabled = false;
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 2000);
        }
        
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.innerHTML = msg;
            el.className = 'status ' + type;
        }
    </script>
</body>
</html>
