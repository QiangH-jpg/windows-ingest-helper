name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller tos
    
    - name: Debug directory
      run: |
        pwd
        ls -la
        ls -la windows_ingest_helper/ || echo "Directory not found"
    
    - name: Build EXE
      run: |
        python -m pip install pyinstaller tos
        pyinstaller --onefile --windowed --name ingest_helper --icon=DEFAULT windows_ingest_helper/main.py
        ls -la dist/ || echo "dist not found"
        mkdir -p dist_release
        cp dist/ingest_helper.exe dist_release/ 2>/dev/null || echo "Copy failed"
        ls -la dist_release/
    
    - name: Create release package
      run: |
        mkdir -p Windows_Release
        cp dist_release/ingest_helper.exe Windows_Release/
        cp windows_ingest_helper/upload_to_tos.py Windows_Release/
        cp windows_ingest_helper/README.md Windows_Release/README.txt || echo "Windows 上传/预处理助手 v2.0" > Windows_Release/README.txt
        echo "v2.0" > Windows_Release/version.txt
        echo "Windows 上传/预处理助手 v2.0" > Windows_Release/README.txt
        echo "========================================" >> Windows_Release/README.txt
        echo "" >> Windows_Release/README.txt
        echo "【启动方式】" >> Windows_Release/README.txt
        echo "双击运行：ingest_helper.exe" >> Windows_Release/README.txt
        echo "" >> Windows_Release/README.txt
        echo "【功能】" >> Windows_Release/README.txt
        echo "- 扫描本地视频文件" >> Windows_Release/README.txt
        echo "- 转码为 720p proxy" >> Windows_Release/README.txt
        echo "- 检测坏片" >> Windows_Release/README.txt
        echo "- 上传到 TOS" >> Windows_Release/README.txt
        echo "- 生成素材清单" >> Windows_Release/README.txt
        echo "" >> Windows_Release/README.txt
        echo "【TOS 配置】" >> Windows_Release/README.txt
        echo "已内置：" >> Windows_Release/README.txt
        echo "- Bucket: e23-video" >> Windows_Release/README.txt
        echo "- Region: cn-beijing" >> Windows_Release/README.txt
        echo "- Endpoint: tos-cn-beijing.volces.com" >> Windows_Release/README.txt
        echo "" >> Windows_Release/README.txt
        echo "需要设置环境变量（如需上传功能）：" >> Windows_Release/README.txt
        echo "set TOS_AK=你的 Access Key" >> Windows_Release/README.txt
        echo "set TOS_SK=你的 Secret Key" >> Windows_Release/README.txt
        echo "" >> Windows_Release/README.txt
        echo "【版本】v2.0" >> Windows_Release/README.txt
        echo "【日期】${{ github.event.repository.updated_at }}" >> Windows_Release/README.txt
        echo "v2.0" > Windows_Release/version.txt
        echo "Build: ${{ github.run_id }}" >> Windows_Release/version.txt
        echo "Date: ${{ github.event.repository.updated_at }}" >> Windows_Release/version.txt
        echo "Platform: Windows x64" >> Windows_Release/version.txt
        
        cd Windows_Release
        7z a -tzip ../Windows_Ingest_Helper_v2.zip *
        ls -la ../Windows_Ingest_Helper_v2.zip
        
        # 上传到 TOS
        pip install tos
        python -c "
import os
from tos import TosClientV2

TOS_AK = os.getenv('TOS_AK')
TOS_SK = os.getenv('TOS_SK')
if not TOS_AK or not TOS_SK:
    print('TOS 凭据未配置，跳过上传')
    exit(0)
    
TOS_BUCKET = 'e23-video'
TOS_REGION = 'cn-beijing'
TOS_ENDPOINT = f'tos-{TOS_REGION}.volces.com'

client = TosClientV2(ak=TOS_AK, sk=TOS_SK, endpoint=TOS_ENDPOINT, region=TOS_REGION)

zip_path = 'Windows_Ingest_Helper_v2.zip'
tos_key = 'Windows_Executable/Windows_Ingest_Helper_v2.zip'

print(f'Uploading {zip_path} to {tos_key}...')
client.put_object_from_file(bucket=TOS_BUCKET, key=tos_key, file_path=zip_path)
print(f'Upload successful')
print(f'Download URL: https://{TOS_BUCKET}.{TOS_ENDPOINT}/{tos_key}')
"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-package
        path: windows_ingest_helper/Windows_Ingest_Helper_v2.zip
        retention-days: 30
    
    - name: Upload to TOS
      run: |
        pip install tos
        python -c "
        import os
        from tos import TosClientV2
        
        TOS_AK = os.getenv('TOS_AK')
        TOS_SK = os.getenv('TOS_SK')
        TOS_BUCKET = 'e23-video'
        TOS_REGION = 'cn-beijing'
        TOS_ENDPOINT = f'tos-{TOS_REGION}.volces.com'
        
        client = TosClientV2(ak=TOS_AK, sk=TOS_SK, endpoint=TOS_ENDPOINT, region=TOS_REGION)
        
        zip_path = 'windows_ingest_helper/Windows_Ingest_Helper_v2.zip'
        tos_key = 'Windows_Executable/Windows_Ingest_Helper_v2.zip'
        
        print(f'Uploading {zip_path} to {tos_key}...')
        client.put_object_from_file(bucket=TOS_BUCKET, key=tos_key, file_path=zip_path)
        print(f'✅ Upload successful')
        print(f'Download URL: https://{TOS_BUCKET}.{TOS_ENDPOINT}/{tos_key}')
        "
      env:
        TOS_AK: ${{ secrets.TOS_AK }}
        TOS_SK: ${{ secrets.TOS_SK }}
