name: Build Windows EXE v5 (with ffmpeg) (with ffmpeg)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install ffmpeg via Chocolatey
      run: |
        choco install ffmpeg -y --no-progress
        ffmpeg -version
        ffprobe -version
    
    - name: Create bin directory and copy ffmpeg
      run: |
        New-Item -Path "windows_ingest_helper/bin" -ItemType Directory -Force | Out-Null
        Copy-Item (Get-Command ffmpeg).Source -Destination "windows_ingest_helper/bin/ffmpeg.exe" -Force
        Copy-Item (Get-Command ffprobe).Source -Destination "windows_ingest_helper/bin/ffprobe.exe" -Force
        ls windows_ingest_helper/bin/
    
    - name: Install and Build
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd windows_ingest_helper
        # 打包时包含 bin 目录
        pyinstaller --onefile --windowed --name ingest_helper --add-data "bin;bin" main.py
        ls dist/
    
    - name: Create Release Package
      run: |
        New-Item -Path Windows_Release -ItemType Directory -Force
        Copy-Item windows_ingest_helper/dist/ingest_helper.exe Windows_Release/
        Copy-Item windows_ingest_helper/bin/ffmpeg.exe Windows_Release/
        Copy-Item windows_ingest_helper/bin/ffprobe.exe Windows_Release/
        @"
Windows 上传/预处理助手 v5.0
========================================

【启动方式】
双击运行：ingest_helper.exe

【功能】
- 扫描本地视频文件
- 转码为 720p proxy
- 检测坏片
- 上传到 TOS
- 生成素材清单

【内置依赖】
- ffmpeg.exe (已打包)
- ffprobe.exe (已打包)

【版本】v5.0 (内置 ffmpeg/ffprobe)
"@ | Out-File -FilePath Windows_Release/README.txt -Encoding utf8
        "v5.0" | Out-File -FilePath Windows_Release/version.txt -Encoding utf8
        cd Windows_Release
        Compress-Archive -Path * -DestinationPath ..\Windows_Ingest_Helper_v5.zip -Force
        ls ..\Windows_Ingest_Helper_v5.zip
    
    - name: Upload to TOS
      run: |
        pip install tos
        python -c "
        import os
        from tos import TosClientV2
        
        TOS_AK = os.getenv('TOS_AK')
        TOS_SK = os.getenv('TOS_SK')
        if not TOS_AK or not TOS_SK:
            print('TOS 凭据未配置，跳过上传')
            exit(0)
            
        TOS_BUCKET = 'e23-video'
        TOS_REGION = 'cn-beijing'
        TOS_ENDPOINT = f'tos-{TOS_REGION}.volces.com'
        
        client = TosClientV2(ak=TOS_AK, sk=TOS_SK, endpoint=TOS_ENDPOINT, region=TOS_REGION)
        
        zip_path = 'Windows_Ingest_Helper_v5.zip'
        tos_key = 'Windows_Executable/Windows_Ingest_Helper_v5.zip'
        
        print(f'Uploading {zip_path} to {tos_key}...')
        client.put_object_from_file(bucket=TOS_BUCKET, key=tos_key, file_path=zip_path)
        print(f'Upload successful')
        print(f'Download URL: https://{TOS_BUCKET}.{TOS_ENDPOINT}/{tos_key}')
        "
      env:
        TOS_AK: ${{ secrets.TOS_AK }}
        TOS_SK: ${{ secrets.TOS_SK }}
