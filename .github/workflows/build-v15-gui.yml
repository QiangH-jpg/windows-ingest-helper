name: Build V15 GUI EXE v2.5

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install pyinstaller tos
      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $d = Get-ChildItem ffmpeg_extracted -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path v15-tasklink\bin
          Copy-Item "$($d.FullName)\bin\ffmpeg.exe" v15-tasklink\bin\
          Copy-Item "$($d.FullName)\bin\ffprobe.exe" v15-tasklink\bin\
          Remove-Item ffmpeg.zip, ffmpeg_extracted -Recurse -Force
      - name: Build EXE (with ffmpeg bundled)
        working-directory: v15-tasklink
        run: pyinstaller --onefile --windowed --name ingest_helper_v15_gui --add-data "bin;bin" main_gui.py
      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item v15-tasklink\dist\ingest_helper_v15_gui.exe release\
          if (Test-Path "config\config.json") { Copy-Item config\config.json release\config.json.example }
          Compress-Archive -Path release\* -DestinationPath v15_gui_v2.5.zip -Force
          Get-Item v15_gui_v2.5.zip | Select-Object Name, Length
      - uses: actions/upload-artifact@v4
        with:
          name: v15-gui-v2.5
          path: v15_gui_v2.5.zip
          retention-days: 30
