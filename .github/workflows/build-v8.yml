name: Build Windows EXE v8

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyinstaller tos
      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $d = Get-ChildItem ffmpeg_extracted -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path Windows_Release\bin
          Copy-Item "$($d.FullName)\bin\ffmpeg.exe" Windows_Release\bin\
          Copy-Item "$($d.FullName)\bin\ffprobe.exe" Windows_Release\bin\
          Remove-Item ffmpeg.zip, ffmpeg_extracted -Recurse -Force
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name ingest_helper_v8 windows_ingest_helper/main.py
      - name: Copy exe
        run: Copy-Item dist\ingest_helper_v8.exe Windows_Release\
      - name: Create version.txt
        run: |
          $runId = "${{ github.run_id }}"
          $commitSha = "${{ github.sha }}"
          $buildTime = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          @"
Windows Ingest Helper - Version Information
============================================

Version: v8
Build Time: $buildTime
GitHub Run ID: $runId
Commit SHA: $commitSha

This is a fresh build (v8) - NOT the same as v7
"@ | Out-File -FilePath Windows_Release\version.txt -Encoding utf8
      - name: Create ZIP
        run: Compress-Archive -Path Windows_Release\* -DestinationPath Windows_Ingest_Helper_v8.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-v8
          path: Windows_Ingest_Helper_v8.zip
      - name: Upload TOS
        if: '${{ env.TOS_AK != '' }}'
        shell: pwsh
        run: |
          $tosKey = "Windows_Executable/Windows_Ingest_Helper_v8.zip"
          $zipPath = "Windows_Ingest_Helper_v8.zip"
          python -c "
          import os, sys
          from tos import TosClientV2
          TOS_AK = os.getenv('TOS_AK')
          TOS_SK = os.getenv('TOS_SK')
          if not TOS_AK or not TOS_SK:
              print('Error: TOS secrets not configured')
              sys.exit(1)
          print(f'Uploading {sys.argv[1]} to {sys.argv[2]}...')
          client = TosClientV2(ak=TOS_AK, sk=TOS_SK, endpoint='tos-cn-beijing.volces.com', region='cn-beijing')
          client.put_object_from_file(bucket='e23-video', key=sys.argv[2], file_path=sys.argv[1])
          print('Upload successful')
          print(f'Download URL: https://e23-video.tos-cn-beijing.volces.com/{sys.argv[2]}')
          " "$zipPath" "$tosKey"
        env:
          TOS_AK: '${{ secrets.TOS_AK }}'
          TOS_SK: '${{ secrets.TOS_SK }}'
