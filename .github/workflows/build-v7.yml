name: Build Windows EXE v7

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Download ffmpeg official build
        shell: powershell
        run: |
          # 下载 ffmpeg 官方 Windows 构建 (gyan.dev)
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Write-Host "Downloading ffmpeg from: $url"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Write-Host "Download complete, size: $((Get-Item ffmpeg.zip).Length) bytes"
          
          # 解压
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extracted -Force
          Write-Host "Extract complete"
          
          # 找到 ffmpeg 目录
          $ffmpegDir = Get-ChildItem -Path ffmpeg_extracted -Directory -Filter "ffmpeg-*-essentials_build" | Select-Object -First 1
          Write-Host "Found directory: $($ffmpegDir.Name)"
          
          # 创建发布目录
          New-Item -ItemType Directory -Force -Path Windows_Release
          New-Item -ItemType Directory -Force -Path Windows_Release\bin
          
          # 复制真实的 ffmpeg 二进制
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "Windows_Release\bin\ffmpeg.exe" -Force
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "Windows_Release\bin\ffprobe.exe" -Force
          
          # 验证文件大小
          $ffmpegSize = (Get-Item "Windows_Release\bin\ffmpeg.exe").Length
          $ffprobeSize = (Get-Item "Windows_Release\bin\ffprobe.exe").Length
          Write-Host "ffmpeg.exe size: $ffmpegSize bytes ([math]::Round($ffmpegSize/1MB, 2)) MB)"
          Write-Host "ffprobe.exe size: $ffprobeSize bytes ([math]::Round($ffprobeSize/1MB, 2)) MB)"
          
          # 清理
          Remove-Item ffmpeg.zip -Force
          Remove-Item ffmpeg_extracted -Recurse -Force

      - name: Build EXE
        shell: powershell
        run: |
          pyinstaller --onefile --windowed --name ingest_helper windows_ingest_helper/main.py

      - name: Copy EXE and docs
        shell: powershell
        run: |
          Copy-Item "dist\ingest_helper.exe" "Windows_Release\ingest_helper.exe" -Force
          if (Test-Path "windows_ingest_helper\README.txt") {
            Copy-Item "windows_ingest_helper\README.txt" "Windows_Release\README.txt" -Force
          }
          if (Test-Path "windows_ingest_helper\version.txt") {
            Copy-Item "windows_ingest_helper\version.txt" "Windows_Release\version.txt" -Force
          }

      - name: Create ZIP package
        shell: powershell
        run: |
          if (Test-Path "Windows_Ingest_Helper_v7.zip") {
            Remove-Item "Windows_Ingest_Helper_v7.zip" -Force
          }
          Compress-Archive -Path Windows_Release\* -DestinationPath Windows_Ingest_Helper_v7.zip

      - name: Create ZIP package
        shell: powershell
        run: |
          if (Test-Path "Windows_Ingest_Helper_v7.zip") {
            Remove-Item "Windows_Ingest_Helper_v7.zip" -Force
          }
          Compress-Archive -Path Windows_Release\* -DestinationPath Windows_Ingest_Helper_v7.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-v7
          path: Windows_Ingest_Helper_v7.zip
          retention-days: 30

      - name: Upload to TOS (if secrets configured)
        if: env.TOS_AK != '' && env.TOS_SK != ''
        shell: powershell
        run: |
          # 检查 secrets 是否已配置
          if ([string]::IsNullOrEmpty($env:TOS_AK) -or [string]::IsNullOrEmpty($env:TOS_SK)) {
            Write-Host "⚠️ TOS secrets not configured, skipping upload"
            exit 0
          }
          
          Write-Host "✅ TOS secrets configured, uploading..."
          pip install tos
          python -c @"
import os
from tos import TosClientV2

TOS_AK = os.getenv('TOS_AK')
TOS_SK = os.getenv('TOS_SK')
TOS_BUCKET = 'e23-video'
TOS_REGION = 'cn-beijing'
TOS_ENDPOINT = f'tos-{TOS_REGION}.volces.com'

client = TosClientV2(ak=TOS_AK, sk=TOS_SK, endpoint=TOS_ENDPOINT, region=TOS_REGION)

zip_path = 'Windows_Ingest_Helper_v7.zip'
tos_key = 'Windows_Executable/Windows_Ingest_Helper_v7.zip'

print(f'Uploading {zip_path} to {tos_key}...')
client.put_object_from_file(bucket=TOS_BUCKET, key=tos_key, file_path=zip_path)
print(f'✅ Upload successful')
print(f'Download URL: https://{TOS_BUCKET}.{TOS_ENDPOINT}/{tos_key}')
"@
        env:
          TOS_AK: ${{ secrets.TOS_AK }}
          TOS_SK: ${{ secrets.TOS_SK }}
