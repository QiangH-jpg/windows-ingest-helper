name: Build Windows EXE v9

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pyinstaller tos
      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $d = Get-ChildItem ffmpeg_extracted -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path Windows_Release\bin
          Copy-Item "$($d.FullName)\bin\ffmpeg.exe" Windows_Release\bin\
          Copy-Item "$($d.FullName)\bin\ffprobe.exe" Windows_Release\bin\
          Remove-Item ffmpeg.zip, ffmpeg_extracted -Recurse -Force
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name ingest_helper_v9 windows_ingest_helper/main.py
      - name: Copy exe
        run: Copy-Item dist\ingest_helper_v9.exe Windows_Release\
      - name: Create version.txt
        run: |
          $runId = "${{ github.run_id }}"
          $commitSha = "${{ github.sha }}"
          $buildTime = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
          @"
Windows Ingest Helper - Version Information
============================================

Version: v9
Build Time: $buildTime
GitHub Run ID: $runId
Commit SHA: $commitSha

NEW in v9:
- Local TOS upload support
- Config dialog for AK/SK/Bucket/Region/Endpoint
- Real upload to TOS (not just placeholder)
- Manifest writes back tos_key/tos_url/upload_status
"@ | Out-File -FilePath Windows_Release\version.txt -Encoding utf8
      - name: Create README.txt
        run: |
          @"
Windows 上传/预处理助手 v9
============================

【新功能】本地 TOS 上传配置

使用说明：
1. 解压到任意目录
2. 运行 ingest_helper_v9.exe
3. 点击右上角"上传配置"按钮
4. 填写 TOS 凭据：
   - Access Key (AK)
   - Secret Key (SK)
   - Bucket (默认：e23-video)
   - Region (默认：cn-beijing)
   - Endpoint (默认：tos-cn-beijing.volces.com)
5. 保存配置（生成 config.json）
6. 选择源目录，点击"扫描素材"
7. 选择输出目录，点击"批量转码"
8. 点击"上传 TOS"真实上传
9. 点击"保存清单"生成 manifest.json

包含文件：
- ingest_helper_v9.exe (主程序)
- bin/ffmpeg.exe (视频转码)
- bin/ffprobe.exe (视频分析)
- version.txt (版本信息)
- README.txt (本文件)
- config.json (上传配置，首次运行后生成)

构建信息：
- Run ID: ${{ github.run_id }}
- Commit: ${{ github.sha }}
"@ | Out-File -FilePath Windows_Release\README.txt -Encoding utf8
      - name: Create ZIP
        run: Compress-Archive -Path Windows_Release\* -DestinationPath Windows_Ingest_Helper_v9.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-v9
          path: Windows_Ingest_Helper_v9.zip
      - name: Upload TOS
        if: '${{ env.TOS_AK != '' }}'
        shell: pwsh
        run: |
          $tosKey = "Windows_Executable/Windows_Ingest_Helper_v9.zip"
          $zipPath = "Windows_Ingest_Helper_v9.zip"
          python -c "
          import os, sys
          from tos import TosClientV2
          TOS_AK = os.getenv('TOS_AK')
          TOS_SK = os.getenv('TOS_SK')
          if not TOS_AK or not TOS_SK:
              print('Error: TOS secrets not configured')
              sys.exit(1)
          print(f'Uploading {sys.argv[1]} to {sys.argv[2]}...')
          client = TosClientV2(ak=TOS_AK, sk=TOS_SK, endpoint='tos-cn-beijing.volces.com', region='cn-beijing')
          client.put_object_from_file(bucket='e23-video', key=sys.argv[2], file_path=sys.argv[1])
          print('Upload successful')
          print(f'Download URL: https://e23-video.tos-cn-beijing.volces.com/{sys.argv[2]}')
          " "$zipPath" "$tosKey"
        env:
          TOS_AK: '${{ secrets.TOS_AK }}'
          TOS_SK: '${{ secrets.TOS_SK }}'
