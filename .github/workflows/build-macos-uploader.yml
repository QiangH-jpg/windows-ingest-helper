name: Build macOS Uploader

on:
  push:
    tags: ['macos-*', 'v*']
    paths:
      - 'macos-uploader/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: macos-uploader

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: macos-uploader/src-tauri

    - name: Install frontend dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Download static FFmpeg (arm64)
      run: |
        mkdir -p src-tauri/bin
        echo "Downloading static ffmpeg for darwin-arm64..."
        curl -sL "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64.gz" | gunzip > src-tauri/bin/ffmpeg-aarch64-apple-darwin
        curl -sL "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffprobe-darwin-arm64.gz" | gunzip > src-tauri/bin/ffprobe-aarch64-apple-darwin
        chmod +x src-tauri/bin/*
        echo "FFmpeg:"
        src-tauri/bin/ffmpeg-aarch64-apple-darwin -version | head -1
        echo "FFprobe:"
        src-tauri/bin/ffprobe-aarch64-apple-darwin -version | head -1
        echo "File type:"
        file src-tauri/bin/ffmpeg-aarch64-apple-darwin
        echo "Size:"
        ls -lh src-tauri/bin/

    - name: Install Tauri CLI
      run: cargo install tauri-cli --version "^2"

    - name: Build Tauri App (unsigned, Apple Silicon)
      run: cargo tauri build --target aarch64-apple-darwin
      env:
        TAURI_SIGNING_PRIVATE_KEY: ""

    - name: List build artifacts
      run: |
        echo "=== DMG ==="
        find src-tauri/target -name "*.dmg" -type f 2>/dev/null || echo "No DMG"
        echo "=== APP ==="
        find src-tauri/target -name "*.app" -type d 2>/dev/null || echo "No APP"
        echo "=== Sidecar check ==="
        find src-tauri/target -name "ffmpeg" -o -name "ffprobe" 2>/dev/null | head -10
        echo "=== App Contents ==="
        ls -la src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app/Contents/MacOS/ 2>/dev/null || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-uploader-macos-arm64
        path: |
          macos-uploader/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          macos-uploader/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
        retention-days: 30
        if-no-files-found: warn
